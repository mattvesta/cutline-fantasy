services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "3000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=db;Database=cutline;Username=cutline;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      - db
      - redis

  ingest:
    build:
      context: .
      dockerfile: infra/Dockerfile.ingest
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=db;Database=cutline;Username=cutline;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - Ingest__EspnPollIntervalSeconds=60
    depends_on:
      - db
      - redis
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: ../infra/Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - api

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: cutline
      POSTGRES_USER: cutline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
