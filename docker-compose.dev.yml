services:
  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cutline
      POSTGRES_USER: cutline
      POSTGRES_PASSWORD: cutline_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"


volumes:
  postgres_dev_data:
